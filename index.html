---
layout: landing
styles: [arial-main.css]
nstyles: [mrial-main.css]
---

		<div id="wrapper">
			<div id="bg"></div>
			<div id="overlay"></div>
			<div id="main">

				<!-- Header -->
					<header id="header">
                        <h1>{{site.name.default}}</h1>
                        {% if site.name.alternate %}
                        <h1>{{site.name.alternate}}</h1>
                        {% endif %}
						<p>Physicist &nbsp;&bull;&nbsp; Engineer &nbsp;&bull;&nbsp; #Messi</p>
						<nav>
							<ul>
                                <li><a href="/blog/" class="fas fa-book-reader"><span class="label"> Blog</span></a></i>
                                <li><a href="https://twitter.com/{{ site.social.twitter}}" class="icon brands fa-twitter"><span class="label">Twitter</span></a></li>
                                <!--<li><a href="https://facebook.com/{{ site.social.facebook }}" class="icon brands fa-facebook-f"><span class="label">Facebook</span></a></li> -->
                                <li><a href="https://github.com/{{ site.github.username }}" class="icon brands fa-github"><span class="label">Github</span></a></li>
							</ul>
						</nav>
                            <a class="btn btn-primary btn-lg" href="/blog/" role="button">Blog</a>
					</header>

				<!-- Footer -->
					<footer id="footer">
						<span class="copyright">&copy; Prakash 2019</span>
					</footer>

			</div>
		</div>
		<script>
			window.onload = function() { document.body.classList.remove('is-preload'); }
			window.ontouchmove = function() { return false; }
			window.onorientationchange = function() { document.body.scrollTop = 0; }
		</script>
